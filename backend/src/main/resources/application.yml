spring:
  application:
    name: opsany-replica-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:172.16.22.50}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:workflow}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1qaz@WSX}
  redis:
    host: ${REDIS_HOST:172.16.22.43}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:9}
    password: ${REDIS_PASSWORD:redis-22043}
    timeout: 5000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    dynamic: false
    listener:
      simple:
        missing-queues-fatal: false
        default-requeue-rejected: false
        auto-startup: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'
  type-aliases-package: com.opsany.replica.domain
  mapper-locations: classpath:mapper/**/*.xml

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
  session:
    ttl-hours: ${SESSION_TTL_HOURS:8}
    store: ${SESSION_STORE:redis}
  cache:
    bootstrap-ttl-minutes: ${BOOTSTRAP_CACHE_TTL_MINUTES:5}
    bootstrap-enabled: ${BOOTSTRAP_CACHE_ENABLED:true}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  messaging:
    consumer-enabled: ${RABBITMQ_CONSUMER_ENABLED:false}
    publish-enabled: ${RABBITMQ_PUBLISH_ENABLED:false}
    fallback-on-publish-failure: ${RABBITMQ_FALLBACK_ON_FAILURE:true}
  ai:
    provider: ${APP_AI_PROVIDER:mock}
    knowledge-context-enabled: ${APP_AI_KNOWLEDGE_CONTEXT_ENABLED:true}
    bigmodel:
      api-key: ${BIGMODEL_API_KEY:}
      base-url: ${BIGMODEL_BASE_URL:https://open.bigmodel.cn/api/v1/agents}
      agent-id: ${BIGMODEL_AGENT_ID:service_check_agent}
      connect-timeout-ms: ${BIGMODEL_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${BIGMODEL_READ_TIMEOUT_MS:60000}

logging:
  level:
    com.opsany.replica: INFO
