spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:opsany_local;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  rabbitmq:
    dynamic: false
    listener:
      simple:
        auto-startup: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'
  type-aliases-package: com.opsany.replica.domain

app:
  session:
    store: memory
  cache:
    bootstrap-enabled: false
  messaging:
    consumer-enabled: false
    publish-enabled: false
    fallback-on-publish-failure: true
  ai:
    provider: ${APP_AI_PROVIDER:mock}
    knowledge-context-enabled: true
    bigmodel:
      api-key: ${BIGMODEL_API_KEY:}
      base-url: ${BIGMODEL_BASE_URL:https://open.bigmodel.cn/api/v1/agents}
      agent-id: ${BIGMODEL_AGENT_ID:service_check_agent}
      connect-timeout-ms: ${BIGMODEL_CONNECT_TIMEOUT_MS:10000}
      read-timeout-ms: ${BIGMODEL_READ_TIMEOUT_MS:60000}
